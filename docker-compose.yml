# docker-compose for tool-call-finetune-lab
#
# Services:
#   vllm-server   — serves the AWQ-quantized model with GPU pass-through
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed
#   - AWQ model available at ./outputs/awq-model (or override MODEL_PATH)
#   - .env file with HF_TOKEN set (for model downloads if needed)
#
# Usage:
#   docker compose up vllm-server
#   docker compose run smoke-test

services:
  vllm-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: serving
    image: tool-call-finetune-lab:serving
    container_name: vllm-server
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      # Mount the quantized model directory (read-only)
      - "${MODEL_PATH:-./outputs/awq-model}:/model:ro"
    environment:
      MODEL_PATH: /model
      VLLM_PORT: "8000"
      SERVED_MODEL_NAME: "${SERVED_MODEL_NAME:-qwen2.5-7b-tool-call}"
      TENSOR_PARALLEL: "${TENSOR_PARALLEL:-1}"
      MAX_MODEL_LEN: "${MAX_MODEL_LEN:-4096}"
      GPU_MEMORY_UTILIZATION: "${GPU_MEMORY_UTILIZATION:-0.90}"
      HF_TOKEN: "${HF_TOKEN:-}"
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "${TENSOR_PARALLEL:-1}"
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    shm_size: "2gb"

  smoke-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: serving
    image: tool-call-finetune-lab:serving
    container_name: smoke-test
    depends_on:
      vllm-server:
        condition: service_healthy
    environment:
      VLLM_URL: "http://vllm-server:8000/v1"
      MODEL_NAME: "${SERVED_MODEL_NAME:-qwen2.5-7b-tool-call}"
    command: >
      python3 -m tool_call_finetune_lab.serve.openai_compat_test
        --url http://vllm-server:8000/v1
        --model "${SERVED_MODEL_NAME:-qwen2.5-7b-tool-call}"
    profiles:
      - test
