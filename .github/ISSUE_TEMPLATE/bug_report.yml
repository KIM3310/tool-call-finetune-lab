name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `make data`
        2. Run `make train`
        3. See error at step ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error messages or stack traces.
      render: shell

  - type: dropdown
    id: stage
    attributes:
      label: Pipeline Stage
      description: Which part of the pipeline is affected?
      options:
        - Data preparation
        - Training (QLoRA)
        - Evaluation (BFCL)
        - Quantization (AWQ)
        - Serving (vLLM)
        - Docker / CI
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.7"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU / Hardware
      placeholder: "NVIDIA T4 16GB / Kaggle / A100 80GB"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 22.04 / macOS 14.2"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information (screenshots, W&B run links, config changes).
