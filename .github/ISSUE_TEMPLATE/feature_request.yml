name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for improving tool-call-finetune-lab? Describe it here.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: "I'm trying to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API sketches, CLI flags, or config examples if relevant.
    validations:
      required: true

  - type: dropdown
    id: stage
    attributes:
      label: Pipeline Stage
      description: Which part of the pipeline does this affect?
      options:
        - Data preparation
        - Training (QLoRA)
        - Evaluation (BFCL)
        - Quantization (AWQ)
        - Serving (vLLM)
        - Docker / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you thought about and why they are less ideal.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links to relevant papers, benchmarks, or related issues.
